name: Intervals Sync

on:
  workflow_dispatch: # Manueller Start
  schedule:
    - cron: '15 6,18 * * *' # Automatischer Start (06:15 und 18:15 UTC)

jobs:
  run_sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # oder deine aktuelle Version
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Sync Script
        env:
          # Hier werden die Secrets an Python übergeben!
          INTERVALS_ID: ${{ secrets.INTERVALS_ID }}
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python sync_garmin.py # oder wie deine .py Datei heißt
